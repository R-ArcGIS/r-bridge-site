name: Generate Docs

on:
  workflow_dispatch: {}

env:
  CARGO_TARGET_DIR: ${{ github.workspace }}/rust-target

jobs:
  api-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore Rust cache
        id: rust-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            rust-target/release/deps
            rust-target/release/build
          key: ${{ runner.os }}-rust-api-ref
          restore-keys: ${{ runner.os }}-rust-

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          packages: |
            any::pak
            any::pkgdown
            any::pkgload
            any::gert
            any::rvest
            any::cli
            any::yaml
            any::brio
            any::zip
            any::jsonify
            any::RcppSimdJson
            any::sf
            any::terra
            any::hms

      - name: Generate API reference
        run: Rscript dev/generate-api-ref.R

      - name: Save Rust cache
        if: always() && steps.rust-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry
            rust-target/release/deps
            rust-target/release/build
          key: ${{ runner.os }}-rust-api-ref

      - uses: actions/upload-artifact@v4
        with:
          name: api-ref
          path: api-ref.zip
          retention-days: 14

  docs:
    runs-on: ubuntu-latest
    env:
      ARCGIS_USER: ${{ secrets.ARCGIS_USER }}
      ARCGIS_PASSWORD: ${{ secrets.ARCGIS_PASSWORD }}
      ARCGIS_API_KEY: ${{ secrets.ARCGIS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore Rust cache
        id: rust-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            rust-target/release/deps
            rust-target/release/build
          key: ${{ runner.os }}-rust-docs
          restore-keys: ${{ runner.os }}-rust-

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          packages: |
            any::rmarkdown
            any::knitr
            any::downlit
            any::fs
            any::cli
            any::zip
            any::sf
            any::dplyr
            any::pillar
            any::ulid
            any::readr
            any::tidyr
            any::tibble
            any::haven
            any::labelled
            github::r-arcgis/arcgis
            github::r-arcgis/arcgisutils
            github::r-arcgis/arcgisgeocode
            github::r-arcgis/arcgisplaces
            github::r-arcgis/arcgislayers
            github::r-arcgis/arcpbf

      - name: Generate docs
        run: Rscript dev/generate-docs.R

      - name: Save Rust cache
        if: always() && steps.rust-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry
            rust-target/release/deps
            rust-target/release/build
          key: ${{ runner.os }}-rust-docs

      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: _docs.zip
          retention-days: 14
